plugins {
    id 'application'
}

group 'org.example'

ext {
    distName = "GoMule${project.version}-BETA_Resurrected_3.0"
}

def generatedSrcDir = layout.buildDirectory.dir("generated/sources/version/java/main")

sourceSets {
    main {
        java {
            srcDir generatedSrcDir
        }
    }
}

tasks.register('generateVersionJava') {
    inputs.property "version", project.version
    outputs.dir generatedSrcDir

    doLast {
        def versionFile = file("${generatedSrcDir.get()}/gomule/BuildConfig.java")
        versionFile.parentFile.mkdirs()
        versionFile.text = """package gomule;

/** Auto-generated by Gradle. Do not edit. */
public class BuildConfig {
    public static final String VERSION = "${project.version}";
}
"""
    }
}

compileJava.dependsOn generateVersionJava

dependencies {
    implementation project(':GoMuleShared')
    implementation 'com.google.guava:guava:31.0-jre'
    implementation 'com.formdev:flatlaf:1.6'
    implementation 'com.eclipsesource.minimal-json:minimal-json:0.9.5'
    testImplementation "org.mockito:mockito-core:3.+"
    testImplementation "org.junit.jupiter:junit-jupiter:5.5.2"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.5.2"
}

application {
    mainClass = 'gomule.GoMule'
}

// Disable default distribution tasks from application plugin - we use our own
distTar.enabled = false
distZip.enabled = false

processResources {
    filesMatching('gomule.properties') {
        filter {
            it.replace('@appVersion@', project.version)
        }
    }
}

jar {
    manifest {
        attributes(
                'Main-Class': 'gomule.GoMule',
                'Implementation-Version': project.version
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy(DuplicatesStrategy.EXCLUDE)
}

task copyAppJarToDistribution(type: Copy) {
    from jar
    into "build/tmp/distribution/GoMule/app"
    rename { "GoMuleApp.jar" }
}

task copyUpdaterJarToDistribution(type: Copy) {
    from project(':GoMuleUpdater').jar
    into "build/tmp/distribution/GoMule"
    rename { "GoMule.jar" }
}

task copyUpdaterJarNewToDistribution(type: Copy) {
    from project(':GoMuleUpdater').jar
    into "build/tmp/distribution/GoMule/app"
    rename { "GoMule.jar.new" }
}

task copyResourcesToDistribution(type: Copy) {
    from ".", {
        include 'd2111/**'
        include 'dupelists/**'
        include 'resources/**'
        include 'COPYING.txt'
        include 'LICENSE.txt'
        include 'standard.css'
        include 'standard.dat'

    }
    into "build/tmp/distribution/GoMule/"
}

task createDistribution {
    delete "build/tmp/distribution"
    mkdir "build/tmp/distribution/GoMule"
}

task distribution(type: Zip) {
    from 'build/tmp/distribution/'
    include 'GoMule/**'
    archiveFileName = "${distName}.zip"
    dependsOn copyUpdaterJarToDistribution
    dependsOn copyUpdaterJarNewToDistribution
    dependsOn copyAppJarToDistribution
    dependsOn copyResourcesToDistribution
}

copyAppJarToDistribution.dependsOn jar
copyUpdaterJarToDistribution.dependsOn project(':GoMuleUpdater').jar
copyUpdaterJarNewToDistribution.dependsOn project(':GoMuleUpdater').jar
distribution.dependsOn createDistribution
createDistribution.finalizedBy copyUpdaterJarToDistribution
createDistribution.finalizedBy copyAppJarToDistribution
createDistribution.finalizedBy copyResourcesToDistribution
